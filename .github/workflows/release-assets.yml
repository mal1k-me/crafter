name: release-assets

on:
  push:
    tags:
      - "0.1.0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: windows-${{ matrix.target }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: pwsh
        run: |
          $name = "crafter-${{ matrix.target }}"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/crafter.exe" "dist/crafter.exe"
          Compress-Archive -Path dist/* -DestinationPath "$name.zip" -Force
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: crafter-${{ matrix.target }}
          path: crafter-${{ matrix.target }}.zip

  build-macos:
    name: macos-${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          name="crafter-${{ matrix.target }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/crafter" dist/
          tar -czf "$name.tar.gz" -C dist crafter
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: crafter-${{ matrix.target }}
          path: crafter-${{ matrix.target }}.tar.gz

  build-linux:
    name: linux-${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - riscv64gc-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - riscv64gc-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked
      - name: Build
        run: cross build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          name="crafter-${{ matrix.target }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/crafter" dist/
          tar -czf "$name.tar.gz" -C dist crafter
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: crafter-${{ matrix.target }}
          path: crafter-${{ matrix.target }}.tar.gz

  publish-release-assets:
    name: publish-assets
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten files
        run: |
          mkdir -p upload
          find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} upload/ \;
          ls -lah upload
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            upload/*
          fail_on_unmatched_files: true
